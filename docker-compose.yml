services:
  app:
    image: php:8.4-fpm-alpine
    container_name: waybill_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - waybill_net
    command: sh -c "apk add --no-cache shadow && usermod -u 1000 www-data && groupmod -g 1000 www-data && docker-php-ext-install pdo pdo_mysql && php-fpm"

  web:
    image: nginx:alpine
    container_name: waybill_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - waybill_net
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: waybill_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: waybill_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: waybill_user
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - waybill_net

  redis:
    image: redis:alpine
    container_name: waybill_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - waybill_net

networks:
  waybill_net:
    driver: bridge

volumes:
  db_data:
